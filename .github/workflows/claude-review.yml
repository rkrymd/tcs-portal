name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: PR Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            PR #${{ github.event.pull_request.number }} のコードレビューを行ってください。

            1. バグ・ロジックエラー
            2. セキュリティ（ハードコードされた認証情報、SQLインジェクション等）
            3. パフォーマンス問題
            4. GAS特有の注意点（列番号ハードコード、トリガー制限等）

            問題があればインラインコメントで具体的に指摘。問題なければ簡潔にLGTM。

      - name: Slack通知
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="🔴"
          fi

          PAYLOAD=$(cat <<'PAYLOAD_EOF'
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "EMOJI_PH *<PR_URL_PH|PR #PR_NUM_PH: PR_TITLE_PH>*\nRepo: REPO_PH | Author: AUTHOR_PH\nClaudeレビュー完了。GitHubで確認してください。"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "PRを確認" },
                    "url": "PR_URL_PH",
                    "style": "primary"
                  }
                ]
              }
            ]
          }
          PAYLOAD_EOF
          )

          PAYLOAD=$(echo "$PAYLOAD" | sed "s|EMOJI_PH|$EMOJI|g" | sed "s|PR_URL_PH|$PR_URL|g" | sed "s|PR_NUM_PH|$PR_NUM|g" | sed "s|PR_TITLE_PH|$PR_TITLE|g" | sed "s|REPO_PH|$REPO|g" | sed "s|AUTHOR_PH|$AUTHOR|g")

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi
