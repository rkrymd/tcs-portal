name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: PR Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            PR #${{ github.event.pull_request.number }} のコードレビューを行ってください。

            1. バグ・ロジックエラー
            2. セキュリティ（ハードコードされた認証情報、SQLインジェクション等）
            3. パフォーマンス問題
            4. GAS特有の注意点（列番号ハードコード、トリガー制限等）

            問題があればインラインコメントで具体的に指摘。問題なければ簡潔にLGTM。

      - name: レビュー結果取得
        if: always()
        id: get-review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq '[.[] | select(.body | contains("Claude finished")) | .body] | last // "レビュー結果を取得できませんでした"')

          # 要約を抽出（最初の「まとめ」テーブルまたは最初の数行）
          SUMMARY=$(echo "$COMMENTS" | grep -A 20 "まとめ\|LGTM\|マージ" | head -10)
          if [ -z "$SUMMARY" ]; then
            SUMMARY=$(echo "$COMMENTS" | grep -E "🔴|🟡|🟢|✅|LGTM|バグ|セキュリティ|問題" | head -8)
          fi
          if [ -z "$SUMMARY" ]; then
            SUMMARY="レビュー完了（詳細はGitHubで確認）"
          fi

          # 改行をエスケープしてGitHub出力に保存
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 問題件数を検出
          if echo "$COMMENTS" | grep -q "🔴"; then
            echo "status=🔴 要修正" >> $GITHUB_OUTPUT
          elif echo "$COMMENTS" | grep -q "🟡"; then
            echo "status=🟡 軽微な指摘あり" >> $GITHUB_OUTPUT
          else
            echo "status=✅ LGTM" >> $GITHUB_OUTPUT
          fi

      - name: Slack通知
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          STATUS="${{ steps.get-review.outputs.status }}"
          SUMMARY="${{ steps.get-review.outputs.summary }}"

          # ステータスに応じた色
          if echo "$STATUS" | grep -q "🔴"; then
            COLOR="#E01E5A"
          elif echo "$STATUS" | grep -q "🟡"; then
            COLOR="#ECB22E"
          else
            COLOR="#2EB67D"
          fi

          # Slack改行に変換
          SUMMARY_ESCAPED=$(echo "$SUMMARY" | sed 's/"/\\"/g' | tr '\n' ' ' | sed 's/  */ /g' | head -c 500)

          PAYLOAD="{\"attachments\":[{\"color\":\"${COLOR}\",\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*${STATUS}*  <${PR_URL}|PR #${PR_NUM}: ${PR_TITLE}>\n${REPO}\n\n${SUMMARY_ESCAPED}\"}},{\"type\":\"actions\",\"elements\":[{\"type\":\"button\",\"text\":{\"type\":\"plain_text\",\"text\":\"PRを確認\"},\"url\":\"${PR_URL}\",\"style\":\"primary\"}]}]}]}"

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi
