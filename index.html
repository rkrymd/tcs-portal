<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TCS Portal">
  <meta name="theme-color" content="#111018">
  <title>TCS Creator Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #f7f6f3; }
    iframe { border: none; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <iframe id="portal" src="about:blank" allowfullscreen></iframe>
  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbyb9vKcxU5erPiIdxGlyyg_ZN3bvIVEeQCyEJLtkvu04bJjNKUezC7d8C44ehOjQSvJ/exec';

    (function() {
      var iframe = document.getElementById('portal');
      var search = window.location.search;
      var targetUrl;
      if (!search || search === '?') {
        targetUrl = GAS_URL + '?page=creator';
      } else if (search.indexOf('page=') !== -1) {
        targetUrl = GAS_URL + search;
      } else {
        targetUrl = GAS_URL + '?page=creator&' + search.slice(1);
      }
      iframe.src = targetUrl;
    })();
  </script>
</body>
</html>
