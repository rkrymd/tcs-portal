<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TCS Portal">
  <meta name="theme-color" content="#f7f6f3">
  <title>TCS Creator Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;width:100%;overflow:hidden;background:#f7f6f3;}

    #loadScreen{
      position:fixed;inset:0;z-index:9999;
      background:#f7f6f3;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:48px 40px 60px;
    }

    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{
      width:36px;height:36px;
      border:3px solid #e8e6e0;
      border-top-color:#06C755;
      border-radius:50%;
      animation:spin .8s linear infinite;
      margin-bottom:28px;
      flex-shrink:0;
    }

    .load-title{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:20px;font-weight:800;color:#111018;
      letter-spacing:-.4px;margin-bottom:8px;text-align:center;
    }
    .load-sub{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:12px;color:#a09eb8;margin-bottom:36px;
      text-align:center;line-height:1.8;
    }

    .ptrack{
      width:100%;max-width:240px;height:5px;
      background:#e8e6e0;border-radius:3px;overflow:hidden;margin-bottom:12px;
    }
    @keyframes pfill{
      0%  {width:0%}
      25% {width:40%}
      50% {width:62%}
      72% {width:78%}
      88% {width:90%}
      95% {width:96%}
      100%{width:100%}
    }
    .pfill{
      height:100%;width:0;border-radius:3px;
      background:linear-gradient(90deg,#06C755,#00e07a);
      box-shadow:0 0 8px rgba(6,199,85,.35);
    }
    .pfill.go{ animation:pfill 3s cubic-bezier(.4,0,.2,1) forwards; }

    .load-foot{
      width:100%;max-width:240px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .load-brand{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:11px;color:#c8c6d8;font-weight:600;letter-spacing:.3px;
    }
    .load-pct{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:14px;font-weight:800;color:#5a5870;min-width:40px;text-align:right;
    }
  </style>
</head>
<body>

  <div id="loadScreen">
    <div class="spin"></div>
    <div class="load-title">読み込み中...</div>
    <div class="load-sub">初回は少し時間がかかります<br>そのままお待ちください</div>
    <div class="ptrack"><div class="pfill" id="pfill"></div></div>
    <div class="load-foot">
      <div class="load-brand">TCS Creator Portal</div>
      <div class="load-pct" id="pct">0%</div>
    </div>
  </div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxj_KePMzaGKAwJqq6HWO8L5ci68lSsvdglmHUnODv_-X6C9koO-Tg1akxLFZXnq1On/exec';

    var pfill = document.getElementById('pfill');
    var pctEl = document.getElementById('pct');

    // パーセントカウントアップ（3秒で100%まで）
    var PCT_STEPS = [
      [0,0],[300,20],[700,40],[1200,60],[1800,78],[2400,90],[2800,97]
    ];
    pfill.classList.add('go');
    PCT_STEPS.forEach(function(s){
      setTimeout(function(){ pctEl.textContent = s[1]+'%'; }, s[0]);
    });

    // 3秒後に直接遷移（iframeではなくwindow.location）
    setTimeout(function(){
      pctEl.textContent = '100%';

      var search = window.location.search;
      var targetUrl;
      if (!search || search === '?') {
        targetUrl = GAS_URL + '?page=creator';
      } else if (search.indexOf('page=') !== -1) {
        targetUrl = GAS_URL + search;
      } else {
        targetUrl = GAS_URL + '?page=creator&' + search.slice(1);
      }

      // iframeではなく直接遷移 → X-Frame-Optionsエラー完全回避
      window.location.href = targetUrl;
    }, 3000);
  </script>

</body>
</html>
