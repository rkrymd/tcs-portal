<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="robots" content="noindex">
  <!-- 旧ポータルは新ポータル(tcs.ripples-inc.com)へ移行済み。全アクセスを無条件で新ポータルへ遷移させる。 -->
  <meta http-equiv="refresh" content="0; url=https://tcs.ripples-inc.com/">
  <title>TCS Creator Portal は移転しました</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f6f3;color:#2b2a3a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .card{background:#fff;border:1px solid #e8e6e0;border-radius:20px;padding:40px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
    .title{font-size:19px;font-weight:800;letter-spacing:-.3px;margin-bottom:12px}
    .desc{font-size:13.5px;color:#5a5870;line-height:1.8;margin-bottom:24px}
    .btn{display:inline-block;background:#2b2a3a;color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:13px 28px;border-radius:12px}
    .note{font-size:11px;color:#a09eb8;margin-top:16px}
    .spin{width:30px;height:30px;border:3px solid #e8e6e0;border-top-color:#2b2a3a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="spin"></div>
    <div class="title">新しいポータルへ移動します</div>
    <div class="desc">TCS Creator Portal は新しいサイトに移行しました。<br>これまでのアカウント（LINEログイン）でそのままご利用いただけます。</div>
    <a class="btn" href="https://tcs.ripples-inc.com/">新ポータルを開く →</a>
    <div class="note">自動的に移動しない場合は上のボタンを押してください。</div>
  </div>
  <script>location.replace('https://tcs.ripples-inc.com/');</script>
</body>
</html>
