<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TCS Portal">
  <meta name="theme-color" content="#f7f6f3">
  <title>TCS Creator Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;width:100%;overflow:hidden;background:#f7f6f3;}

    /* ── iframe（最初は透明）── */
    iframe{
      border:none;width:100%;height:100%;display:block;
      opacity:0;
      transition:opacity .55s cubic-bezier(.4,0,.2,1);
    }
    iframe.visible{ opacity:1; }

    /* ── ローディングオーバーレイ ── */
    #loadScreen{
      position:fixed;inset:0;z-index:9999;
      background:#f7f6f3;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:48px 40px 60px;
      transition:opacity .55s cubic-bezier(.4,0,.2,1), visibility .55s;
    }
    #loadScreen.out{
      opacity:0;visibility:hidden;pointer-events:none;
    }

    /* スピナー */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{
      width:36px;height:36px;
      border:3px solid #e8e6e0;
      border-top-color:#06C755;
      border-radius:50%;
      animation:spin .8s linear infinite;
      margin-bottom:28px;
      flex-shrink:0;
    }

    /* テキスト */
    .load-title{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:20px;font-weight:800;color:#111018;
      letter-spacing:-.4px;margin-bottom:8px;text-align:center;
    }
    .load-sub{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:12px;color:#a09eb8;margin-bottom:36px;
      text-align:center;line-height:1.8;
    }

    /* プログレスバー */
    .ptrack{
      width:100%;max-width:240px;height:5px;
      background:#e8e6e0;border-radius:3px;overflow:hidden;margin-bottom:12px;
    }
    @keyframes pfill{
      0%  {width:0%}
      25% {width:40%}
      50% {width:62%}
      72% {width:78%}
      88% {width:90%}
      95% {width:96%}
      100%{width:100%}
    }
    .pfill{
      height:100%;width:0;border-radius:3px;
      background:linear-gradient(90deg,#06C755,#00e07a);
      box-shadow:0 0 8px rgba(6,199,85,.35);
    }
    .pfill.go{ animation:pfill 22s cubic-bezier(.4,0,.2,1) forwards; }

    /* フッター（サービス名 + %) */
    .load-foot{
      width:100%;max-width:240px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .load-brand{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:11px;color:#c8c6d8;font-weight:600;letter-spacing:.3px;
    }
    .load-pct{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:14px;font-weight:800;color:#5a5870;min-width:40px;text-align:right;
    }
  </style>
</head>
<body>

  <!-- ローディング画面 -->
  <div id="loadScreen">
    <div class="spin"></div>
    <div class="load-title">読み込み中...</div>
    <div class="load-sub">少し時間がかかる場合があります<br>そのままお待ちください</div>
    <div class="ptrack"><div class="pfill" id="pfill"></div></div>
    <div class="load-foot">
      <div class="load-brand">TCS Creator Portal</div>
      <div class="load-pct" id="pct">0%</div>
    </div>
  </div>

  <!-- ポータル本体（裏で読み込み中）-->
  <iframe id="portal" src="about:blank"></iframe>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbynGD114UttjrVOfS_JXF5iAlSY2OyKo8rg1jMvC-45UNzLAgmPfOIIDBppWJTJsw7Q/exec';

    var iframe   = document.getElementById('portal');
    var loadScr  = document.getElementById('loadScreen');
    var pfill    = document.getElementById('pfill');
    var pctEl    = document.getElementById('pct');
    var done     = false;

    // ── ストレージキー ──
    var TOKEN_KEY = 'tcs_parent_token';
    var CACHE_KEY = 'tcs_parent_cache';
    var COOKIE_KEY = 'tcs_tk';
    var TOKEN_TTL = 30 * 24 * 60 * 60 * 1000; // 30日
    var _memoryToken = null;

    // ── Cookie ヘルパー ──
    function _setCookie(name, value, days) {
      var expires = '';
      if (days) {
        var d = new Date();
        d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = '; expires=' + d.toUTCString();
      }
      // Secure付き（GitHub PagesはHTTPS）
      document.cookie = name + '=' + encodeURIComponent(value) + expires + '; path=/; SameSite=Lax; Secure';
    }
    function _getCookie(name) {
      var eq = name + '=';
      var parts = document.cookie.split(';');
      for (var i = 0; i < parts.length; i++) {
        var c = parts[i].trim();
        if (c.indexOf(eq) === 0) return decodeURIComponent(c.substring(eq.length));
      }
      return null;
    }
    function _removeCookie(name) {
      document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';
    }

    // ── URLハッシュ ヘルパー（最終フォールバック）──
    function _getHashToken() {
      var h = window.location.hash;
      var m = h.match(/[#&]tk=([^&]+)/);
      return m ? decodeURIComponent(m[1]) : null;
    }
    function _setHashToken(token) {
      // 既存ハッシュを保持しつつtkを追加/更新
      var h = window.location.hash.replace(/[#&]?tk=[^&]*/g, '');
      window.location.hash = 'tk=' + encodeURIComponent(token) + (h ? '&' + h.replace(/^#/, '') : '');
    }
    function _clearHashToken() {
      var h = window.location.hash.replace(/[#&]?tk=[^&]*/g, '').replace(/^#/, '');
      window.location.hash = h || '';
      if (!h) history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    // ── トークン取得（4層フォールバック）──
    function _parentGetToken() {
      // 1. localStorage
      try {
        var raw = localStorage.getItem(TOKEN_KEY);
        if (raw) {
          var obj = JSON.parse(raw);
          if (Date.now() - obj.ts > TOKEN_TTL) { localStorage.removeItem(TOKEN_KEY); }
          else return obj.token;
        }
      } catch(e) {}
      // 2. Cookie
      var ck = _getCookie(COOKIE_KEY);
      if (ck) return ck;
      // 3. メモリ
      if (_memoryToken) return _memoryToken;
      // 4. URLハッシュ（LINEブラウザ最終手段）
      return _getHashToken();
    }

    // ── トークン保存（全ストレージに同時書き込み）──
    function _parentSaveToken(token) {
      if (!token) return;
      _memoryToken = token;
      try { localStorage.setItem(TOKEN_KEY, JSON.stringify({ token: token, ts: Date.now() })); } catch(e) {}
      try { _setCookie(COOKIE_KEY, token, 30); } catch(e) {}
      try { _setHashToken(token); } catch(e) {}
    }

    // ── トークンクリア ──
    function _parentClearToken() {
      _memoryToken = null;
      try { localStorage.removeItem(TOKEN_KEY); } catch(e) {}
      try { localStorage.removeItem(CACHE_KEY); } catch(e) {}
      _removeCookie(COOKIE_KEY);
      _clearHashToken();
    }

    // ── iframeにトークンをプッシュ（能動的に送る）──
    function _pushTokenToIframe() {
      var token = _parentGetToken();
      if (!token) return;
      var cache = null;
      try {
        var cRaw = localStorage.getItem(CACHE_KEY);
        if (cRaw) {
          var cObj = JSON.parse(cRaw);
          if (Date.now() - cObj.ts < 30 * 60 * 1000) cache = cObj.data;
          else localStorage.removeItem(CACHE_KEY);
        }
      } catch(ex) {}
      try {
        iframe.contentWindow.postMessage({ tcs: 'tokenResponse', token: token, cache: cache }, '*');
      } catch(ex) {}
    }

    // ── iframe（GAS）からのpostMessageを受信 ──
    window.addEventListener('message', function(e) {
      if (!e.data || !e.data.tcs) return;
      try {
        if (e.data.tcs === 'saveToken') {
          _parentSaveToken(e.data.token);
        } else if (e.data.tcs === 'clearToken') {
          _parentClearToken();
        } else if (e.data.tcs === 'saveCache') {
          try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: e.data.cache })); } catch(ex) {}
        } else if (e.data.tcs === 'clearCache') {
          try { localStorage.removeItem(CACHE_KEY); } catch(ex) {}
        } else if (e.data.tcs === 'getToken') {
          _pushTokenToIframe();
        }
      } catch(ex) {}
    });

    // ── パーセント疑似カウント ──
    var PCT_STEPS = [
      [0,0],[400,8],[900,18],[1800,30],
      [3000,42],[5000,55],[8000,68],[11000,78],
      [14000,86],[16000,91],[18000,95],[19500,97]
    ];
    function startPct() {
      pfill.classList.add('go');
      PCT_STEPS.forEach(function(s){
        setTimeout(function(){ if(!done) pctEl.textContent = s[1]+'%'; }, s[0]);
      });
    }

    // ── ローディング終了 ──
    function finishLoading() {
      if (done) return;
      done = true;
      pctEl.textContent = '100%';
      setTimeout(function(){
        loadScr.classList.add('out');
        iframe.classList.add('visible');
      }, 350);
    }

    // ── iframe load イベント ──
    var _onloadFired = false;
    iframe.addEventListener('load', function(){
      if (iframe.src === 'about:blank' || iframe.src === '') return;

      // ★ 毎回のiframe loadでトークンを能動的にプッシュ（GAS側のgetToken要求を待たない）
      setTimeout(_pushTokenToIframe, 300);
      setTimeout(_pushTokenToIframe, 1500);

      if (_onloadFired) {
        var elapsed = Date.now() - startTime;
        var wait = Math.max(0, 1500 - elapsed);
        setTimeout(finishLoading, wait);
      }
      _onloadFired = true;
    });

    // ★ ハートビート: 3秒ごとにトークンをiframeに再注入
    setInterval(function() {
      if (done && _parentGetToken()) {
        _pushTokenToIframe();
      }
    }, 3000);

    // タイムアウト保険
    setTimeout(finishLoading, 25000);

    // ── iframe 読み込み開始 ──
    var startTime = Date.now();
    startPct();

    var search = window.location.search;

    // ── _tk パラメータ ──
    var tkMatch = search.match(/[?&]_tk=([^&]+)/);
    var _handled = false;
    if (tkMatch) {
      var newToken = decodeURIComponent(tkMatch[1]);
      _parentSaveToken(newToken);
      // ストレージ確認（ハッシュも含めて必ず成功するはず）
      window.location.replace(window.location.pathname + '#tk=' + encodeURIComponent(newToken));
      _handled = true;
    }

    // ── _clear パラメータ ──
    if (!_handled && search.indexOf('_clear=1') !== -1) {
      _parentClearToken();
      window.location.replace(window.location.pathname);
      _handled = true;
    }

    // ── LINE認証コールバック ──
    // fetch()はLINEブラウザで不安定なため廃止。常にiframeのGASに直接渡す。
    var isCallback = search.indexOf('page=creator_callback') !== -1 && search.indexOf('code=') !== -1;

    // ── iframe読み込み関数 ──
    function _loadIframe(tokenOverride) {
      var targetUrl;
      if (isCallback) {
        // ★ LINE認証コールバック: code/stateをGASにそのまま渡す
        targetUrl = GAS_URL + search;
      } else if (!search || search === '?') {
        targetUrl = GAS_URL + '?page=creator';
      } else if (search.indexOf('page=') !== -1) {
        targetUrl = GAS_URL + search;
      } else {
        targetUrl = GAS_URL + '?page=creator&' + search.slice(1);
      }
      var tk = tokenOverride || _parentGetToken();
      if (tk && targetUrl.indexOf('pt=') === -1) {
        targetUrl += (targetUrl.indexOf('?') >= 0 ? '&' : '?') + 'pt=' + encodeURIComponent(tk);
      }

      // quick_action対応
      var isQuickAction = search.indexOf('page=quick_action') !== -1;
      if (isQuickAction) {
        var ptrackEl = document.querySelector('.ptrack');
        var pfootEl  = document.querySelector('.load-foot');
        var titleEl  = document.querySelector('.load-title');
        var subEl    = document.querySelector('.load-sub');
        if (titleEl) titleEl.textContent = '処理中...';
        if (subEl)   subEl.textContent   = 'そのままお待ちください';
        if (ptrackEl) ptrackEl.style.display = 'none';
        if (pfootEl)  pfootEl.style.display  = 'none';
      }

      iframe.src = targetUrl;
    }

    if (!_handled) { _loadIframe(null); }
  </script>
</body>
</html>
