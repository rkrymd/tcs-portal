<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TCS Portal">
  <meta name="theme-color" content="#f7f6f3">
  <title>TCS Creator Portal</title>
</head>
<body>
<script>
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbxj_KePMzaGKAwJqq6HWO8L5ci68lSsvdglmHUnODv_-X6C9koO-Tg1akxLFZXnq1On/exec';

  // LINEのOAuthコールバック (?code=...&state=...) も含めてそのままGASに転送
  var search = window.location.search;
  var targetUrl;
  if (!search || search === '?') {
    targetUrl = GAS_URL + '?page=creator';
  } else if (search.indexOf('page=') !== -1) {
    targetUrl = GAS_URL + search;
  } else {
    // ?code=xxx&state=xxx 等のOAuthコールバックパラメータをそのまま転送
    targetUrl = GAS_URL + search;
  }

  // iframeではなく直接リダイレクト
  // GAS側のloadingScreenがそのまま表示される
  window.location.replace(targetUrl);
</script>
</body>
</html>
